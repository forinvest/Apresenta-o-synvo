  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

A7A7A;\n    --paper: #F5F2EC;\n    --paper-warm: #EDE9DF;\n    --accent: #14365C;\n    --accent-light: #2D6FB8;\n    --accent-pale: #D4E1ED;\n    --amber: #C47B2B;\n    --amber-pale: #F5E6CC;\n    --coral: #C4432B;\n    --coral-pale: #F5DDD8;\n    --rule: #D4CFC4;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    font-family: 'DM Sans', sans-serif;\n    font-weight: 300;\n    background: var(--ink);\n    color: var(--paper);\n    overflow: hidden;\n    height: 100vh;\n    width: 100vw;\n  }\n\n  /* DECK CONTAINER */\n  .deck {\n    width: 100%;\n    height: 100vh;\n    position: relative;\n  }\n\n  .slide {\n    position: absolute;\n    inset: 0;\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity .5s ease;\n    display: flex;\n    flex-direction: column;\n  }\n\n  .slide.active {\n    opacity: 1;\n    pointer-events: all;\n  }\n\n  /* NAV */\n  .nav {\n    position: fixed;\n    bottom: 2rem;\n    left: 50%;\n    transform: translateX(-50%);\n    display: flex;\n    align-items: center;\n    gap: 1.5rem;\n    z-index: 100;\n    background: rgba(14,14,14,.7);\n    backdrop-filter: blur(12px);\n    padding: .6rem 1.25rem;\n    border-radius: 100px;\n    border: 1px solid rgba(255,255,255,.1);\n  }\n\n  .nav-btn {\n    background: none;\n    border: none;\n    color: rgba(255,255,255,.5);\n    font-size: 18px;\n    cursor: pointer;\n    padding: .25rem .5rem;\n    transition: color .2s;\n    font-family: 'DM Sans', sans-serif;\n  }\n\n  .nav-btn:hover { color: #fff; }\n\n  .nav-dots {\n    display: flex;\n    gap: 6px;\n    align-items: center;\n  }\n\n  .nav-dot {\n    width: 6px;\n    height: 6px;\n    border-radius: 50%;\n    background: rgba(255,255,255,.25);\n    cursor: pointer;\n    transition: all .2s;\n  }\n\n  .nav-dot.active {\n    background: #fff;\n    width: 18px;\n    border-radius: 3px;\n  }\n\n  .slide-counter {\n    font-size: 11px;\n    color: rgba(255,255,255,.35);\n    font-family: 'DM Mono', monospace;\n    min-width: 40px;\n    text-align: center;\n  }\n\n  /* ============ SLIDE 1 — CAPA ============ */\n  .s1 {\n    background: var(--ink);\n    justify-content: center;\n    align-items: flex-start;\n    padding: 5rem 6rem;\n    overflow: hidden;\n  }\n\n  .s1::before {\n    content: '';\n    position: absolute;\n    top: -260px;\n    right: -220px;\n    width: 900px;\n    height: 900px;\n    border-radius: 50%;\n    background: radial-gradient(circle, rgba(20,54,92,.55) 0%, transparent 70%);\n  }\n\n  .s1-motif {\n    position: absolute;\n    top: 50%;\n    right: 5rem;\n    transform: translateY(-50%);\n    width: 36vw;\n    max-width: 620px;\n    min-width: 340px;\n    aspect-ratio: 1 / 1;\n    z-index: -1;\n    pointer-events: none;\n  }\n\n  .s1-eyebrow {\n    font-size: 11px;\n    font-weight: 500;\n    letter-spacing: .18em;\n    text-transform: uppercase;\n    color: var(--accent-light);\n    margin-bottom: 1.5rem;\n    display: flex;\n    align-items: center;\n    gap: .75rem;\n  }\n\n  .s1-eyebrow::before {\n    content: '';\n    width: 32px;\n    height: 1px;\n    background: var(--accent-light);\n  }\n\n  .s1 h1 {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(3rem, 6.4vw, 6rem);\n    font-weight: 400;\n    line-height: 1.05;\n    color: var(--paper);\n    max-width: 860px;\n    margin-bottom: 1.25rem;\n  }\n\n  .s1 h1 em {\n    font-style: italic;\n    color: var(--accent-light);\n  }\n\n  .s1-tagline {\n    font-family: 'Playfair Display', serif;\n    font-style: italic;\n    font-size: clamp(18px, 1.9vw, 26px);\n    color: var(--accent-pale);\n    font-weight: 400;\n    margin-bottom: 1.75rem;\n    max-width: 620px;\n    line-height: 1.35;\n  }\n\n  .s1-sub {\n    font-size: 17px;\n    color: rgba(245,242,236,.5);\n    max-width: 520px;\n    line-height: 1.7;\n    font-weight: 300;\n  }\n\n  .s1-brand {\n    position: absolute;\n    top: 2.5rem;\n    left: 6rem;\n    display: flex;\n    align-items: center;\n    gap: 1rem;\n    z-index: 5;\n  }\n  .s1-brand img {\n    height: 30px;\n    display: block;\n    filter: brightness(0) invert(1);\n    opacity: .92;\n  }\n  .s1-brand-divider {\n    width: 1px;\n    height: 18px;\n    background: rgba(255,255,255,.18);\n  }\n  .s1-brand-product {\n    font-family: 'DM Mono', monospace;\n    font-size: 11px;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,.55);\n  }\n\n  .s1-logo {\n    position: absolute;\n    top: 2.5rem;\n    right: 3rem;\n    font-family: 'DM Mono', monospace;\n    font-size: 13px;\n    letter-spacing: .1em;\n    color: rgba(255,255,255,.3);\n  }\n\n  .s1-line {\n    position: absolute;\n    bottom: 0;\n    left: 6rem;\n    right: 6rem;\n    height: 1px;\n    background: linear-gradient(90deg, transparent, var(--rule) 20%, var(--rule) 80%, transparent);\n    opacity: .3;\n  }\n\n  /* ============ SLIDE 2 — PROBLEMA ============ */\n  .s2 {\n    background: var(--paper);\n    color: var(--ink);\n    padding: 4rem 6rem;\n    justify-content: center;\n  }\n\n  .s-label {\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    color: var(--ink-muted);\n    margin-bottom: 2rem;\n    display: flex;\n    align-items: center;\n    gap: .6rem;\n  }\n\n  .s-label::after {\n    content: '';\n    flex: 1;\n    height: 1px;\n    background: var(--rule);\n  }\n\n  .s2 h2 {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(2rem, 4vw, 3.5rem);\n    font-weight: 400;\n    line-height: 1.15;\n    color: var(--ink);\n    max-width: 780px;\n    margin-bottom: 3rem;\n  }\n\n  .s2 h2 em {\n    font-style: italic;\n    color: var(--accent);\n  }\n\n  .pain-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 1px;\n    background: var(--rule);\n    border: 1px solid var(--rule);\n    max-width: 1180px;\n  }\n\n  .pain-item {\n    background: var(--paper);\n    padding: 1.5rem 1.75rem;\n  }\n\n  .pain-num {\n    f ng: 3rem 4rem 4.5rem;\n    flex-direction: row;\n    align-items: center;\n    gap: 2.5rem;\n    overflow: hidden;\n  }\n\n  .s8-left {\n    flex: 0 0 38%;\n    display: flex;\n    flex-direction: column;\n  }\n\n  .s8-right {\n    flex: 1;\n    position: relative;\n    align-self: stretch;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n\n  .s8 h2 {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(1.7rem, 2.6vw, 2.3rem);\n    font-weight: 400;\n    line-height: 1.2;\n    margin-bottom: .6rem;\n    margin-top: .4rem;\n  }\n\n  .s8 h2 em {\n    font-style: italic;\n    color: var(--accent);\n  }\n\n  .s8-sub {\n    font-size: 14px;\n    color: var(--ink-muted);\n    line-height: 1.6;\n    margin-bottom: 1.5rem;\n  }\n\n  .diagram {\n    position: relative;\n    width: 100%;\n    max-width: 620px;\n    aspect-ratio: 1 / 1;\n    max-height: 100%;\n    margin: 0 auto;\n  }\n\n  .diagram svg.diagram-rings {\n    position: absolute;\n    inset: 0;\n    width: 100%;\n    height: 100%;\n  }\n\n  .diagram-core {\n    position: absolute;\n    top: 50%; left: 50%;\n    transform: translate(-50%, -50%);\n    width: 28%;\n    aspect-ratio: 1 / 1;\n    border-radius: 50%;\n    background: var(--accent);\n    color: #fff;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    text-align: center;\n    z-index: 4;\n    box-shadow: 0 8px 32px rgba(20,54,92,.25);\n    padding: 0 .5rem;\n  }\n\n  .diagram-core-label {\n    font-size: 8px;\n    letter-spacing: .18em;\n    text-transform: uppercase;\n    color: var(--accent-pale);\n    margin-bottom: .2rem;\n  }\n\n  .diagram-core-name {\n    font-family: 'Playfair Display', serif;\n    font-style: italic;\n    font-size: 17px;\n    line-height: 1.1;\n    margin-bottom: .15rem;\n  }\n\n  .diagram-core-tagline {\n    font-size: 8px;\n    color: rgba(255,255,255,.55);\n    letter-spacing: .04em;\n  }\n\n  /* Input source nodes — 3 around the core (triangle) */\n  .source-node {\n    position: absolute;\n    width: 38%;\n    background: #fff;\n    border: 1.5px solid var(--accent);\n    border-radius: 6px;\n    padding: .65rem .85rem;\n    z-index: 3;\n    box-shadow: 0 2px 10px rgba(20,54,92,.06);\n  }\n\n  .source-node-tag {\n    font-family: 'DM Mono', monospace;\n    font-size: 9px;\n    letter-spacing: .1em;\n    color: var(--accent);\n    margin-bottom: .15rem;\n  }\n\n  .source-node-name {\n    font-size: 13px;\n    font-weight: 500;\n    color: var(--ink);\n    margin-bottom: .2rem;\n  }\n\n  .source-node-items {\n    font-size: 11.5px;\n    color: var(--ink-muted);\n    line-height: 1.45;\n  }\n\n  .source-node.crm   { top: 2%;    left: 50%; transform: translateX(-50%); }\n  .source-node.canal { bottom: 4%; left: 2%; }\n  .source-node.leads { bottom: 4%; right: 2%; }\n\n  /* Output decisions — column inside left side */\n  .decisions {\n    margin-top: 1.5rem;\n    padding-top: 1.25rem;\n    border-top: 1px solid var(--rule);\n  }\n\n  .decisions-label {\n    font-family: 'DM Mono', monospace;\n    font-size: 9px;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    color: var(--ink-muted);\n    margin-bottom: .75rem;\n  }\n\n  .decisions-row {\n    display: flex;\n    flex-direction: column;\n    gap: .5rem;\n  }\n\n  .decision-chip {\n    background: var(--paper-warm);\n    border: 1px solid var(--rule);\n    border-radius: 4px;\n    padding: .55rem .85rem;\n    font-size: 13px;\n    color: var(--ink);\n    display: flex;\n    align-items: center;\n    gap: .55rem;\n  }\n  .decision-chip::before {\n    content: '';\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--accent-light);\n    flex-shrink: 0;\n  }\n\n  /* ============ SLIDE 9 — CTA ============ */\n  .s9 {\n    background: var(--ink);\n    color: var(--paper);\n    padding: 4rem 6rem;\n    justify-content: center;\n    overflow: hidden;\n  }\n\n  .s9::before {\n    content: '';\n    position: absolute;\n    top: -140px;\n    right: -160px;\n    width: 800px;\n    height: 800px;\n    border-radius: 50%;\n    background: radial-gradient(circle, rgba(45,111,184,.3) 0%, transparent 70%);\n  }\n\n  .s9-motif {\n    position: absolute;\n    bottom: -8%;\n    right: 3rem;\n    width: 32vw;\n    max-width: 560px;\n    min-width: 320px;\n    aspect-ratio: 1 / 1;\n    z-index: -1;\n    pointer-events: none;\n  }\n\n  .s9 h2 {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(2.5rem, 5.4vw, 4.75rem);\n    font-weight: 400;\n    line-height: 1.1;\n    max-width: 780px;\n    margin-bottom: 2rem;\n    color: var(--paper);\n  }\n\n  .s9 h2 em {\n    font-style: italic;\n    color: var(--accent-light);\n  }\n\n  .s9-sub {\n    font-family: 'Playfair Display', serif;\n    font-style: italic;\n    font-size: clamp(18px, 1.8vw, 27px);\n    color: var(--accent-pale);\n    max-width: 800px;\n    line-height: 1.4;\n    margin-bottom: 2.5rem;\n    font-weight: 400;\n  }\n\n  .s9 .cta-row {\n    display: flex;\n    gap: 1rem;\n    align-items: center;\n  }\n\n  .s9 .cta-primary {\n    background: var(--accent-light);\n    color: #fff;\n    padding: .9rem 2.2rem;\n    border-radius: 4px;\n    font-size: 14px;\n    font-weight: 500;\n    border: none;\n    cursor: pointer;\n    font-family: 'DM Sans', sans-serif;\n    letter-spacing: .02em;\n  }\n\n  .s9 .cta-secondary {\n    font-size: 13px;\n    color: rgba(245,242,236,.45);\n    font-weight: 300;\n  }\n\n  .s9-contact {\n    margin-top: 3rem;\n    padding-top: 2rem;\n    border-top: 1px solid rgba(255,255,255,.1);\n    display: flex;\n    gap: 4rem;\n    max-width: 680px;\n  }\n\n  .s9-contact .contact-label {\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: .12em;\n    text-transform: uppercase;\n    color: rgba(245,242,236,.4);\n    display: block;\n    margin-bottom: .25rem;\n  }\n\n  .s9-contact .contact-value {\n    font-size: 14px;\n    color: var(--paper);\n  }\n\n  /* PROGRESS BAR */\n  .progress {\n    position: fixed;\n    top: 0;\n    left: 0;\n    height: 2px;\n    background: var(--accent-light);\n    transition: width .4s ease;\n    z-index: 100;\n  }\n\n  /* QUOTE PULL */\n  .pull-quote {\n    font-family: 'Playfair Display', serif;\n    font-style: italic;\n    font-size: 19px;\n    color: var(--ink-light);\n    max-width: 680px;\n    line-height: 1.5;\n    margin-top: 2.25rem;\n    padding-left: 1.5rem;\n    border-left: 2px solid var(--rule);\n  }\n\n  .pull-quote cite {\n    display: block;\n    font-style: normal;\n    font-family: 'DM Sans', sans-serif;\n    font-size: 11px;\n    font-weight: 400;\n    color: var(--ink-muted);\n    margin-top: .5rem;\n    letter-spacing: .04em;\n  }\n\n  /* Keyboard hint */\n  .key-hint {\n    position: fixed;\n    top: 1.5rem;\n    right: 1.5rem;\n    font-size: 10px;\n    color: rgba(255,255,255,.2);\n    font-family: 'DM Mono', monospace;\n    letter-spacing: .06em;\n    z-index: 100;\n    transition: color .2s;\n  }\n\n  .key-hint:hover { color: rgba(255,255,255,.5); }\n\n  /* ============ SLIDE — CAPTURE (WhatsApp → dado) ============ */\n  .s-capture {\n    background: var(--ink);\n    color: var(--paper);\n    padding: 2.5rem 4rem 4rem;\n    justify-content: center;\n    overflow: hidden;\n  }\n\n  .s-capture h2 {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(1.7rem, 2.8vw, 2.4rem);\n    font-weight: 400;\n    color: var(--paper);\n    max-width: 820px;\n    line-height: 1.2;\n    margin-bottom: .5rem;\n  }\n  .s-capture h2 em {\n    font-style: italic;\n    color: var(--accent-light);\n  }\n  .s-capture-sub {\n    font-size: 14px;\n    color: rgba(245,242,236,.55);\n    max-width: 760px;\n    line-height: 1.6;\n    margin-bottom: 1.75rem;\n  }\n\n  .capture-flow {\n    display: grid;\n    grid-template-columns: 1fr 40px 1fr 40px 1fr;\n    gap: 0;\n    max-width: 1450px;\n    align-items: stretch;\n  }\n\n  .capture-stage {\n    display: flex;\n    flex-direction: column;\n    background: rgba(255,255,255,.04);\n    border: 1px solid rgba(255,255,255,.1);\n    border-radius: 6px;\n    padding: 1rem 1.1rem;\n    gap: .7rem;\n  }\n\n  .capture-stage-label {\n    font-family: 'DM Mono', monospace;\n    font-size: 10px;\n    letter-spacing: .14em;\n    color: rgba(255,255,255,.4);\n  }\n\n  .capture-stage-name {\n    font-size: 15px;\n    font-weight: 500;\n    color: #fff;\n  }\n\n  .capture-arrow {\n    align-self: center;\n    font-family: 'Playfair Display', serif;\n    font-size: 32px;\n    color: var(--accent-light);\n    opacity: .8;\n  }\n\n  .capture-stage-caption {\n    font-size: 12px;\n    color: rgba(255,255,255,.5);\n    line-height: 1.5;\n    margin-top: auto;\n  }\n\n  .capture-process {\n    background: rgba(45,111,184,.08);\n    border: 1px dashed rgba(45,111,184,.3);\n    border-radius: 4px;\n    padding: 1rem .75rem;\n    height: 195px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    gap: 1rem;\n    text-align: center;\n  }\n\n  .capture-process-core {\n    width: 56px; height: 56px;\n    border-radius: 50%;\n    background: var(--accent-light);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-family: 'Playfair Display', serif;\n    font-style: italic;\n    font-size: 22px;\n    color: #fff;\n    position: relative;\n    box-shadow: 0 0 0 1px rgba(45,111,184,.3);\n  }\n  .capture-process-core::before,\n  .capture-process-core::after {\n    content: '';\n    position: absolute;\n    inset: -10px;\n    border-radius: 50%;\n    border: 1px solid rgba(45,111,184,.35);\n    animation: capPulse 2.6s infinite ease-out;\n  }\n  .capture-process-core::after { inset: -20px; animation-delay: .8s; }\n\n  @keyframes capPulse {\n    0%   { opacity: .8; transform: scale(.92); }\n    100% { opacity: 0;  transform: scale(1.3); }\n  }\n\n  .capture-process-steps {\n    display: flex;\n    flex-direction: column;\n    gap: 4px;\n    font-size: 10.5px;\n    color: rgba(255,255,255,.6);\n    font-family: 'DM Mono', monospace;\n  }\n  .capture-process-step::before {\n    content: '› ';\n    color: var(--accent-light);\n  }\n\n  .capture-data {\n    background: rgba(8,20,38,.6);\n    border: 1px solid rgba(255,255,255,.08);\n    border-radius: 4px;\n    padding: .65rem .75rem;\n    height: 195px;\n    display: flex;\n    flex-direction: column;\n    gap: 2px;\n    overflow: hidden;\n  }\n  .capture-data-row {\n    display: grid;\n    grid-template-columns: 78px 1fr;\n    gap: 8px;\n    padding: 4px 0;\n    border-bottom: 1px dashed rgba(255,255,255,.05);\n    font-size: 10px;\n  }\n  .capture-data-row:last-child { border-bottom: 0; }\n  .capture-data-key {\n    font-family: 'DM Mono', monospace;\n    color: rgba(255,255,255,.4);\n    letter-spacing: .04em;\n    font-size: 9px;\n  }\n  .capture-data-value {\n    color: rgba(255,255,255,.9);\n    font-size: 10.5px;\n  }\n  .capture-data-value.tag {\n    display: inline-block;\n    background: rgba(123,216,172,.1);\n    color: #7BD8AC;\n    padding: 1px 7px;\n    border-radius: 20px;\n    font-size: 9px;\n    font-family: 'DM Mono', monospace;\n    text-transform: uppercase;\n    letter-spacing: .06em;\n    align-self: flex-start;\n    border: 1px solid rgba(123,216,172,.3);\n  }\n\n  /* ============ SLIDE — PROPOSTA ============ */\n  .s-proposta {\n    background: var(--paper);\n    color: var(--ink);\n    padding: 2.25rem 4rem 3rem;\n    justify-content: flex-start;\n    overflow: hidden;\n  }\n\n  .s-proposta h2 {\n    font-family: 'Playfair Display', serif;\n    font-size: clamp(1.7rem, 2.6vw, 2.3rem);\n    font-weight: 400;\n    line-height: 1.2;\n    margin-bottom: 1.1rem;\n    max-width: 820px;\n  }\n  .s-proposta h2 em {\n    font-style: italic;\n    color: var(--accent);\n  }\n\n  .proposta-grid {\n    display: grid;\n    grid-template-columns: 38% 1fr;\n    gap: 2rem;\n    max-width: 1320px;\n    flex: 1;\n    min-height: 0;\n  }\n\n  /* LEFT */\n  .proposta-left {\n    display: flex;\n    flex-direction: column;\n    gap: 1rem;\n  }\n\n  .proposta-client {\n    background: var(--accent);\n    color: #fff;\n    border-radius: 6px;\n    padding: .85rem 1.1rem;\n  }\n  .proposta-client-tag {\n    font-family: 'DM Mono', monospace;\n    font-size: 9px;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    color: var(--accent-pale);\n    margin-bottom: .2rem;\n  }\n  .proposta-client-name {\n    font-family: 'Playfair Display', serif;\n    font-style: italic;\n    font-size: 22px;\n    line-height: 1.15;\n  }\n  .proposta-client-loc {\n    font-size: 11px;\n    color: rgba(255,255,255,.65);\n    margin-top: .15rem;\n  }\n\n  .proposta-context-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: .65rem .9rem;\n  }\n  .proposta-context-num {\n    font-family: 'Playfair Display', serif;\n    font-size: 22px;\n    color: var(--ink);\n    line-height: 1.1;\n    margin-bottom: .1rem;\n    display: block;\n  }\n  .proposta-context-label {\n    font-size: 10.5px;\n    color: var(--ink-muted);\n    line-height: 1.35;\n  }\n\n  .proposta-timing {\n    font-family: 'Playfair Display', serif;\n    font-style: italic;\n    font-size: 13px;\n    color: var(--ink-light);\n    line-height: 1.5;\n    padding: .65rem 0;\n    border-top: 1px solid var(--rule);\n    border-bottom: 1px solid var(--rule);\n  }\n\n  .proposta-invest {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 1rem;\n    margin-top: auto;\n  }\n  .proposta-invest-label {\n    font-family: 'DM Mono', monospace;\n    font-size: 9px;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    color: var(--ink-muted);\n    margin-bottom: .25rem;\n    display: block;\n  }\n  .proposta-invest-price {\n    font-family: 'Playfair Display', serif;\n    font-size: 26px;\n    line-height: 1.1;\n    margin-bottom: .25rem;\n    color: var(--ink);\n  }\n  .proposta-invest-price em {\n    font-style: italic;\n    font-size: 12px;\n    color: var(--ink-muted);\n    font-family: 'DM Sans', sans-serif;\n    font-weight: 400;\n    margin-left: .2rem;\n  }\n  .proposta-invest-meta {\n    font-size: 10.5px;\n    color: var(--ink-muted);\n    line-height: 1.4;\n  }\n\n  /* RIGHT */\n  .proposta-right-label {\n    font-family: 'DM Mono', monospace;\n    font-size: 10px;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    color: var(--ink-muted);\n    margin-bottom: .65rem;\n    display: flex;\n    align-items: center;\n    gap: .6rem;\n  }\n  .proposta-right-label::after {\n    content: '';\n    flex: 1;\n    height: 1px;\n    background: var(--rule);\n  }\n\n  .proposta-pair {\n    display: grid;\n    grid-template-columns: 26px 1fr;\n    gap: .55rem;\n    padding: .75rem 0;\n    border-bottom: 1px solid var(--rule);\n  }\n  .proposta-pair:last-child { border-bottom: 0; }\n\n  .proposta-pair-num {\n    font-family: 'DM Mono', monospace;\n    font-size: 10px;\n    color: var(--accent);\n    letter-spacing: .04em;\n    padding-top: .15rem;\n  }\n\n  .proposta-pair-challenge {\n    font-size: 11px;\n    color: var(--ink-muted);\n    line-height: 1.45;\n    margin-bottom: .3rem;\n  }\n  .proposta-pair-challenge::before {\n    content: 'Hoje · ';\n    font-family: 'DM Mono', monospace;\n    font-size: 9px;\n    letter-spacing: .08em;\n    text-transform: uppercase;\n    color: var(--coral);\n    margin-right: .15rem;\n  }\n  .proposta-pair-solution {\n    font-size: 12px;\n    color: var(--ink);\n    font-weight: 500;\n    line-height: 1.45;\n  }\n  .proposta-pair-solution::before {\n    content: 'Engage · ';\n    font-family: 'DM Mono', monospace;\n    font-size: 9px;\n    letter-spacing: .08em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-right: .15rem;\n    font-weight: 500;\n  }\n\n  /* Decorative cover/CTA motifs only have room to breathe on wide screens */\n  @media (max-width: 1300px) {\n    .s1-motif, .s9-motif { display: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"progress\" id=\"progress\"><\u002Fdiv>\n<div class=\"key-hint\">← → para navegar<\u002Fdiv>\n\n<div class=\"deck\" id=\"deck\">\n\n  <!-- SLIDE 1 — CAPA -->\n  <div class=\"slide s1 active\">\n    <svg class=\"s1-motif\" viewBox=\"0 0 100 100\" aria-hidden=\"true\">\n      <circle cx=\"50\" cy=\"50\" r=\"44\" fill=\"none\" stroke=\"#2D6FB8\" stroke-width=\"0.3\" opacity=\".16\"><\u002Fcircle>\n      <circle cx=\"50\" cy=\"50\" r=\"30\" fill=\"none\" stroke=\"#2D6FB8\" stroke-width=\"0.3\" stroke-dasharray=\"0.8 1.6\" opacity=\".22\"><\u002Fcircle>\n      <line x1=\"50\" y1=\"50\" x2=\"50\" y2=\"9\" stroke=\"#2D6FB8\" stroke-width=\"0.3\" opacity=\".3\"><\u002Fline>\n      <line x1=\"50\" y1=\"50\" x2=\"15\" y2=\"71\" stroke=\"#2D6FB8\" stroke-width=\"0.3\" opacity=\".3\"><\u002Fline>\n      <line x1=\"50\" y1=\"50\" x2=\"85\" y2=\"71\" stroke=\"#2D6FB8\" stroke-width=\"0.3\" opacity=\".3\"><\u002Fline>\n      <circle cx=\"50\" cy=\"50\" r=\"3.2\" fill=\"#2D6FB8\" opacity=\".45\"><\u002Fcircle>\n      <circle cx=\"50\" cy=\"9\" r=\"1.7\" fill=\"#2D6FB8\" opacity=\".55\"><\u002Fcircle>\n      <circle cx=\"15\" cy=\"71\" r=\"1.7\" fill=\"#2D6FB8\" opacity=\".55\"><\u002Fcircle>\n      <circle cx=\"85\" cy=\"71\" r=\"1.7\" fill=\"#2D6FB8\" opacity=\".55\"><\u002Fcircle>\n    <\u002Fsvg>\n    <div class=\"s1-brand\">\n      <img src=\"14fb3847-d133-4679-aed7-2a21587514fd\" alt=\"Synvo\">\n      <div class=\"s1-brand-divider\"><\u002Fdiv>\n      <span class=\"s1-brand-product\">Engage<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"s1-eyebrow\">Inteligência Comercial<\u002Fdiv>\n    <h1>Do operacional<br>ao <em>estratégico.<\u002Fem><\u002Fh1>\n    <p class=\"s1-tagline\">Decida com dado real, não com feeling.<\u002Fp>\n    <p class=\"s1-sub\">A camada de inteligência que conecta canal de parcerias, pipeline e resultado. Entrega ao diretor comercial o que ele precisa saber antes de precisar perguntar.<\u002Fp>\n    <div class=\"s1-line\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SLIDE 2 — PROBLEMA -->\n  <div class=\"slide s2\">\n    <div class=\"s-label\">O cenário atual<\u002Fdiv>\n    <h2>A incorporadora decide <em>milhões<\u002Fem> com a informação que cabe num grupo de WhatsApp.<\u002Fh2>\n    <div class=\"pain-grid\">\n      <div class=\"pain-item\">\n        <div class=\"pain-num\">01<\u002Fdiv>\n        <div class=\"pain-text\">\n          <strong>Canal no escuro<\u002Fstrong>\n          3.000 corretores. Ninguém sabe quem está ativo, quem sumiu, quem tem cliente quente parado.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain-item\">\n        <div class=\"pain-num\">02<\u002Fdiv>\n        <div class=\"pain-text\">\n          <strong>Informação espalhada<\u002Fstrong>\n          DWV, CRM, Sienge, planilha. Quando precisam do dado, montam na hora: para prestar conta, não para decidir.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pain-item\">\n        <div class=\"pain-num\">03<\u002Fdiv>\n        <div class=\"pain-text\">\n          <strong>Atribuição zero<\u002Fstrong>\n          Treinamentos, visitas, campanhas, eventos: tudo vai para o mesmo bolo. Ninguém sabe o que de fato gerou venda.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pull-quote\">\n      \"Eu sei tudo que acontece na prática. Mas mapeado 100%, não.\"\n      <cite>Gestora comercial, 6 obras, SC<\u002Fcite>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SLIDE 3 — VISÃO -->\n  <div class=\"slide s3\">\n    <div class=\"s-label\" style=\"color:rgba(255,255,255,.4)\">A resposta<\u002Fdiv>\n    <h2>Inteligência comercial não é um <em>dashboard.<\u002Fem><br>É uma decisão melhor.<\u002Fh2>\n    <div class=\"vision-def\">\n      <div class=\"vision-card\">\n        <div class=\"vision-card-label\">O que não é<\u002Fdiv>\n        <p>Mais um sistema para abrir toda manhã. Mais um relatório para montar antes da reunião. Mais uma ferramenta que depende de alguém alimentar.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"vision-card\">\n        <div class=\"vision-card-label\">O que é<\u002Fdiv>\n        <p>O produto que chega até o diretor com o contexto já processado, quando a decisão precisa ser tomada. Sem login. Sem espera. Sem montar planilha.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"vision-card\">\n        <div class=\"vision-card-label\">A pergunta central<\u002Fdiv>\n        <p>\"Vou bater a meta esse mês?\" Respondida automaticamente, todo dia, com dado real do canal e do pipeline.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"vision-card\">\n        <div class=\"vision-card-label\">O diferencial<\u002Fdiv>\n        <p>Captura o dado onde ele já existe: no canal, no CRM, na campanha. Sem depender de alguém lembrar de registrar.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SLIDE 5 — FONTES -->\n  <div class=\"slide s4\">\n    <div class=\"s-label\">Arquitetura de dado<\u002Fdiv>\n    <h2>Três fontes. Uma inteligência.<\u002Fh2>\n    <div class=\"sources\">\n      <div class=\"source-card canal\">\n        <span class=\"source-badge\">Canal de parceria<\u002Fspan>\n        <div class=\"source-name\">Synvo Engage<\u002Fdiv>\n        <div class=\"source-desc\">Canal de corretores via WhatsApp. Quem está ativo, morno, inativo. Histórico de interação. Campanhas e engajamento.<\u002Fdiv>\n        <div class=\"source-tags\">\n          <span class=\"source-tag\">ativo/morno/inativo<\u002Fspan>\n          <span class=\"source-tag\">campanhas<\u002Fspan>\n          <span class=\"source-tag\">dossiê corretor<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"source-card crm\">\n        <span class=\"source-badge\">CRM<\u002Fspan>\n        <div class=\"source-name\">Pipeline &amp; vendas<\u002Fdiv>\n        <div class=\"source-desc\">Propostas, reservas, unidades vendidas, leads e histórico de situações. API aberta com webhooks em tempo real.<\u002Fdiv>\n        <div class=\"source-tags\">\n          <span class=\"source-tag\">pipeline<\u002Fspan>\n          <span class=\"source-tag\">reservas<\u002Fspan>\n          <span class=\"source-tag\">atribuição<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"source-card demanda\">\n        <span class=\"source-badge\">Geração de demanda<\u002Fspan>\n        <div class=\"source-name\">Meta · Google Ads<\u002Fdiv>\n        <div class=\"source-desc\">Origem dos leads, custo por campanha, conversão por canal. Fecha o ciclo do anúncio até a unidade vendida.<\u002Fdiv>\n        <div class=\"source-tags\">\n          <span class=\"source-tag\">origem de lead<\u002Fspan>\n          <span class=\"source-tag\">custo/venda<\u002Fspan>\n          <span class=\"source-tag\">ROI campanha<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SLIDE 5 — O QUE ENXERGA -->\n  <div class=\"slide s5\">\n    <div class=\"s-label\" style=\"color:rgba(245,242,236,.3)\">O que muda<\u002Fdiv>\n    <h2>O diretor passa a <em>enxergar<\u002Fem> o que antes só sentia.<\u002Fh2>\n    <div class=\"insights-grid\">\n      <div class=\"insight-item\">\n        <div class=\"insight-num\">01 · META<\u002Fdiv>\n        <div class=\"insight-title\">Vou bater a meta esse mês?<\u002Fdiv>\n        <div class=\"insight-desc\">Projeção automática baseada no ritmo atual. Com antecedência suficiente para agir, não para constatar.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"insight-item\">\n        <div class=\"insight-num\">02 · CANAL<\u002Fdiv>\n        <div class=\"insight-title\">Quem sumiu com cliente quente?<\u002Fdiv>\n        <div class=\"insight-desc\">Alerta automático: corretor ativo no canal mas sem proposta. Reserva expirando. Unidade parada há X dias.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"insight-item\">\n        <div class=\"insight-num\">03 · ATRIBUIÇÃO<\u002Fdiv>\n        <div class=\"insight-title\">O que de fato gerou venda?<\u002Fdiv>\n        <div class=\"insight-desc\">Treinamento, campanha, visita, evento: cruzado com resultado real. Fim da decisão no feeling sobre o que funciona.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"insight-item\">\n        <div class=\"insight-num\">04 · PROPOSTA<\u002Fdiv>\n        <div class=\"insight-title\">Posso aceitar essa condição?<\u002Fdiv>\n        <div class=\"insight-desc\">Simulador de proposta: impacto no fluxo antes de responder o corretor. Sem abrir planilha às 22h.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SLIDE 6 — DO MACRO AO MICRO -->\n  <div class=\"slide s6\">\n    <div class=\"s-label\">Do macro ao micro<\u002Fdiv>\n    <h2>Inteligência que começa no estratégico e desce até o canal.<\u002Fh2>\n    <p class=\"s6-sub\">A mesma plataforma que entrega visão de meta e pipeline para o diretor, controla o canal de corretores para o gestor de parcerias.<\u002Fp>\n    <div class=\"canal-layers\">\n      <div class=\"canal-layer macro\">\n        <div class=\"canal-layer-left\">\n          <div class=\"canal-layer-tag\">Diretor comercial<\u002Fdiv>\n          <div class=\"canal-layer-name\">Visão estratégica<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"canal-layer-right\">\n          <span class=\"canal-chip\">Meta do mês<\u002Fspan>\n          <span class=\"canal-chip\">Projeção de VGV<\u002Fspan>\n          <span class=\"canal-chip\">Pipeline em risco<\u002Fspan>\n          <span class=\"canal-chip\">Atribuição de canal<\u002Fspan>\n          <span class=\"canal-chip\">Impacto de proposta<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"canal-layer micro\">\n        <div class=\"canal-layer-left\">\n          <div class=\"canal-layer-tag\">Gestor de parcerias<\u002Fdiv>\n          <div class=\"canal-layer-name\">Operação do canal<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"canal-layer-right\">\n          <span class=\"canal-chip\">Corretores ativos<\u002Fspan>\n          <span class=\"canal-chip\">Campanhas WhatsApp<\u002Fspan>\n          <span class=\"canal-chip\">IA responde tabela<\u002Fspan>\n          <span class=\"canal-chip\">Ranking de performance<\u002Fspan>\n          <span class=\"canal-chip\">Dossiê do corretor<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SLIDE 7 — ENGAGE (wireframes) -->\n  <div class=\"slide s7\">\n    <div class=\"s7-product\">\n      <span class=\"s7-product-name\">Synvo Engage<\u002Fspan>\n      <span class=\"s7-product-tag\">Canal de parcerias<\u002Fspan>\n    <\u002Fdiv>\n    <h2>Você <em>vê<\u002Fem> o canal e <em>opera<\u002Fem> em cima dele.<\u002Fh2>\n    <p class=\"s7-sub\">Do operacional ao estratégico: acabe com os gargalos e mantenha o controle do seu canal de parcerias.<\u002Fp>\n\n    <!-- STRATEGIC LAYER: simplified channel health -->\n    <div class=\"channel-health\">\n      <div class=\"ch-header\">\n        <div class=\"ch-title\">Saúde do canal<\u002Fdiv>\n        <div class=\"ch-meta\">3.124 corretores<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ch-bar\">\n        <div class=\"ch-bar-seg ativo\" style=\"width:13%\"><\u002Fdiv>\n        <div class=\"ch-bar-seg morno\" style=\"width:39%\"><\u002Fdiv>\n        <div class=\"ch-bar-seg inativo\" style=\"width:48%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ch-legend\" style=\"margin-bottom:0\">\n        <div class=\"ch-legend-item\"><span class=\"ch-legend-dot ativo\"><\u002Fspan> Ativos<span class=\"ch-legend-num\">412<\u002Fspan><\u002Fdiv>\n        <div class=\"ch-legend-item\"><span class=\"ch-legend-dot morno\"><\u002Fspan> Mornos<span class=\"ch-legend-num\">1.230<\u002Fspan><\u002Fdiv>\n        <div class=\"ch-legend-item\"><span class=\"ch-legend-dot inativo\"><\u002Fspan> Inativos<span class=\"ch-legend-num\">1.482<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"s7-op-label\">Operacional<\u002Fdiv>\n\n    <div class=\"wf-grid\">\n\n      <!-- WF 1: WhatsApp IA -->\n      <div class=\"wf-card\">\n        <div class=\"wf-screen\">\n          <div class=\"wf-screen-header\">\n            <div class=\"wf-avatar\">JC<\u002Fdiv>\n            <div class=\"wf-screen-title\">João · Corretor<\u002Fdiv>\n            <div class=\"wf-screen-sub\">14:32<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-bubble wf-bubble-in\">Manda a tabela do Bloco B?<\u002Fdiv>\n          <div class=\"wf-bubble wf-bubble-out\">\n            <div class=\"wf-bubble-attach\">Tabela_BlocoB.pdf<\u002Fdiv>\n            Aqui está.\n          <\u002Fdiv>\n          <div class=\"wf-bubble wf-bubble-in\">Forma de pagamento?<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-caption\">\n          <div class=\"wf-num\">01<\u002Fdiv>\n          <div>\n            <strong>IA no WhatsApp<\u002Fstrong>\n            <span>Tabela, folder, condição de pagamento: a IA responde no WhatsApp do gestor. Quando ele não pode atender, ninguém fica esperando o dia seguinte.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- WF 2: Saúde do canal -->\n      <div class=\"wf-card\">\n        <div class=\"wf-screen\">\n          <div class=\"wf-screen-header\">\n            <div class=\"wf-screen-title\">Saúde do canal<\u002Fdiv>\n            <div class=\"wf-screen-sub\">3.124<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-tabs\">\n            <div class=\"wf-tab active\">Ativos<\u002Fdiv>\n            <div class=\"wf-tab\">Mornos<\u002Fdiv>\n            <div class=\"wf-tab\">Inativos<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-row\">\n            <div class=\"wf-avatar\">AM<\u002Fdiv>\n            <div class=\"wf-row-name\">Ana Martins<\u002Fdiv>\n            <div class=\"wf-pill ativo\">Ativo<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-row\">\n            <div class=\"wf-avatar\">LC<\u002Fdiv>\n            <div class=\"wf-row-name\">Lucas Costa<\u002Fdiv>\n            <div class=\"wf-pill morno\">Morno<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-row\">\n            <div class=\"wf-avatar\">MP<\u002Fdiv>\n            <div class=\"wf-row-name\">Marina Paz<\u002Fdiv>\n            <div class=\"wf-pill inativo\">Inativo<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-caption\">\n          <div class=\"wf-num\">02<\u002Fdiv>\n          <div>\n            <strong>Status do corretor<\u002Fstrong>\n            <span>Cada corretor classificado automaticamente pelas conversas: ativo, morno ou inativo. Sem planilha, sem registro manual: você vê o canal todo, em tempo real.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- WF 3: Campanha -->\n      <div class=\"wf-card\">\n        <div class=\"wf-screen\">\n          <div class=\"wf-screen-header\">\n            <div class=\"wf-screen-title\">Nova campanha<\u002Fdiv>\n            <div class=\"wf-screen-sub\">Meta<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-mini-label\">Segmento<\u002Fdiv>\n          <div class=\"wf-segment\">\n            <span class=\"wf-chip sel\">Mornos<\u002Fspan>\n            <span class=\"wf-chip\">Ativos<\u002Fspan>\n            <span class=\"wf-chip sel\">Já vendeu<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"wf-mini-label\" style=\"margin-top:4px\">Mensagem<\u002Fdiv>\n          <div class=\"wf-block\">Bloco B do Aurora liberado. Tabela em anexo.<\u002Fdiv>\n          <div class=\"wf-cta\">Enviar · 318 corretores<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-caption\">\n          <div class=\"wf-num\">03<\u002Fdiv>\n          <div>\n            <strong>Campanhas segmentadas<\u002Fstrong>\n            <span>Selecione o segmento (mornos, ativos, região) e dispare. Parceiro oficial Meta, sem risco de bloqueio. Cada campanha mede quem abriu, respondeu e converteu.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- WF 4: Proposta → CRM -->\n      <div class=\"wf-card\">\n        <div class=\"wf-screen\">\n          <div class=\"wf-screen-header\">\n            <div class=\"wf-screen-title\">Proposta · fluxo<\u002Fdiv>\n            <div class=\"wf-screen-sub\">auto<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf-flow\">\n            <div class=\"wf-mini\">\n              <div class=\"wf-mini-label\">WhatsApp<\u002Fdiv>\n              <div class=\"wf-bubble wf-bubble-in\" style=\"font-size:7.5px;padding:3px 5px\">M. Souza<\u002Fdiv>\n              <div class=\"wf-bubble wf-bubble-in\" style=\"font-size:7.5px;padding:3px 5px\">Unid. 1204 · R$ 680k<\u002Fdiv>\n              <div class=\"wf-bubble wf-bubble-in\" style=\"font-size:7.5px;padding:3px 5px\">25% · 60x<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wf-flow-arrow\">→<\u002Fdiv>\n            <div class=\"wf-mini\">\n              <div class=\"wf-mini-label\">CRM<\u002Fdiv>\n              <div class=\"wf-block\" style=\"font-size:7.5px;padding:3px 5px\">M. Souza<br><span style=\"color:rgba(255,255,255,.4)\">Unid. 1204<\u002Fspan><\u002Fdiv>\n              <div class=\"wf-block\" style=\"font-size:7.5px;padding:3px 5px\">R$ 680k<br><span style=\"color:rgba(255,255,255,.4)\">60x · 25%<\u002Fspan><\u002Fdiv>\n              <div class=\"wf-pill ativo\" style=\"font-size:7px;align-self:flex-start\">Pré-reserva<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"wf-caption\">\n          <div class=\"wf-num\">04<\u002Fdiv>\n          <div>\n            <strong>Proposta → CRM<\u002Fstrong>\n            <span>Corretor manda cliente, unidade e condição no WhatsApp. A Synvo extrai e cria a reserva no CRM. Sem login, sem formulário: o gestor só aprova.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SLIDE — CAPTURE (WhatsApp → dado) — vem direto depois do Engage -->\n  <div class=\"slide \"s8-left\">\n      <div class=\"s-label\">Visão 360°<\u002Fdiv>\n      <h2>Uma camada de inteligência sobre <em>tudo o que já existe.<\u002Fem><\u002Fh2>\n      <p class=\"s8-sub\">A Synvo não substitui o CRM ou o canal. Conecta os dois (mais o tráfego pago) numa única leitura, e devolve decisão pronta para o diretor.<\u002Fp>\n      <div class=\"decisions\">\n        <div class=\"decisions-label\">Entrega ao diretor<\u002Fdiv>\n        <div class=\"decisions-row\">\n          <div class=\"decision-chip\">Vou bater a meta?<\u002Fdiv>\n          <div class=\"decision-chip\">Atribuição real de canal<\u002Fdiv>\n          <div class=\"decision-chip\">Quem sumiu com cliente quente?<\u002Fdiv>\n          <div class=\"decision-chip\">Simulador de proposta<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"s8-right\">\n      <div class=\"diagram\">\n        <svg class=\"diagram-rings\" viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\">\n          <ellipse cx=\"50\" cy=\"50\" rx=\"40\" ry=\"40\" fill=\"none\" stroke=\"#14365C\" stroke-width=\"0.2\" stroke-dasharray=\"0.6 1\" opacity=\".2\"><\u002Fellipse>\n          <ellipse cx=\"50\" cy=\"50\" rx=\"28\" ry=\"28\" fill=\"none\" stroke=\"#14365C\" stroke-width=\"0.2\" stroke-dasharray=\"0.6 1\" opacity=\".3\"><\u002Fellipse>\n          <line x1=\"50\" y1=\"16\" x2=\"50\" y2=\"36\" stroke=\"#2D6FB8\" stroke-width=\"0.35\" opacity=\".55\"><\u002Fline>\n          <line x1=\"35\" y1=\"78\" x2=\"44\" y2=\"62\" stroke=\"#2D6FB8\" stroke-width=\"0.35\" opacity=\".55\"><\u002Fline>\n          <line x1=\"65\" y1=\"78\" x2=\"56\" y2=\"62\" stroke=\"#2D6FB8\" stroke-width=\"0.35\" opacity=\".55\"><\u002Fline>\n        <\u002Fsvg>\n\n        <div class=\"diagram-core\">\n          <div class=\"diagram-core-label\">Synvo<\u002Fdiv>\n          <div class=\"diagram-core-name\">Inteligência<br>Comercial<\u002Fdiv>\n          <div class=\"diagram-core-tagline\">decisão pronta<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"source-node crm\">\n          <div class=\"source-node-tag\">FONTE 01 · CRM<\u002Fdiv>\n          <div class=\"source-node-name\">Pipeline &amp; vendas<\u002Fdiv>\n          <div class=\"source-node-items\">Propostas, reservas, unidades, leads.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"source-node canal\">\n          <div class=\"source-node-tag\">FONTE 02 · CANAL<\u002Fdiv>\n          <div class=\"source-node-name\">Corretores · WhatsApp<\u002Fdiv>\n          <div class=\"source-node-items\">Atividade, conversas, campanhas, IA.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"source-node leads\">\n          <div class=\"source-node-tag\">FONTE 03 · ADS<\u002Fdiv>\n          <div class=\"source-node-name\">Meta · Google<\u002Fdiv>\n          <div class=\"source-node-items\">Origem do lead, custo, ROI por canal.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SLIDE 11 — CTA (final) -->\n  <div class=\"slide s9\">\n    <svg class=\"s9-motif\" viewBox=\"0 0 100 100\" aria-hidden=\"true\">\n      <circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"none\" stroke=\"#2D6FB8\" stroke-width=\"0.3\" opacity=\".18\"><\u002Fcircle>\n      <circle cx=\"50\" cy=\"50\" r=\"32\" fill=\"none\" stroke=\"#2D6FB8\" stroke-width=\"0.3\" stroke-dasharray=\"0.8 1.6\" opacity=\".24\"><\u002Fcircle>\n      <circle cx=\"50\" cy=\"50\" r=\"16\" fill=\"none\" stroke=\"#2D6FB8\" stroke-width=\"0.3\" opacity=\".3\"><\u002Fcircle>\n      <circle cx=\"50\" cy=\"18\" r=\"1.6\" fill=\"#2D6FB8\" opacity=\".5\"><\u002Fcircle>\n      <circle cx=\"79\" cy=\"63\" r=\"1.6\" fill=\"#2D6FB8\" opacity=\".5\"><\u002Fcircle>\n      <circle cx=\"21\" cy=\"63\" r=\"1.6\" fill=\"#2D6FB8\" opacity=\".5\"><\u002Fcircle>\n    <\u002Fsvg>\n    <h2>O próximo passo para sua <em>operação.<\u002Fem><\u002Fh2>\n    <p class=\"s9-sub\">Chega de operação manual. Chega de decisão no feeling.<\u002Fp>\n    <div class=\"s9-contact\">\n      <div class=\"contact-item\">\n        <span class=\"contact-label\">Contato<\u002Fspan>\n        <span class=\"contact-value\">Everton · Synvo<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"contact-item\">\n        <span class=\"contact-label\">WhatsApp<\u002Fspan>\n        <span class=\"contact-value\">+55 47 99776-7843<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"contact-item\">\n        <span class=\"contact-label\">Site<\u002Fspan>\n        <span class=\"contact-value\">synvo.com.br<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- NAV -->\n<div class=\"nav\">\n  <button class=\"nav-btn\" id=\"prev\" onclick=\"changeSlide(-1)\">←<\u002Fbutton>\n  <div class=\"nav-dots\" id=\"dots\"><\u002Fdiv>\n  <span class=\"slide-counter\" id=\"counter\">1 / 10<\u002Fspan>\n  <button class=\"nav-btn\" id=\"next\" onclick=\"changeSlide(1)\">→<\u002Fbutton>\n<\u002Fdiv>\n\n<script>\n  const slides = document.querySelectorAll('.slide');\n  const dotsContainer = document.getElementById('dots');\n  const counter = document.getElementById('counter');\n  const progress = document.getElementById('progress');\n  let current = 0;\n  const total = slides.length;\n\n  // Build dots\n  slides.forEach((_, i) => {\n    const dot = document.createElement('div');\n    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');\n    dot.onclick = () => goTo(i);\n    dotsContainer.appendChild(dot);\n  });\n\n  function goTo(n) {\n    slides[current].classList.remove('active');\n    dotsContainer.children[current].classList.remove('active');\n    current = (n + total) % total;\n    slides[current].classList.add('active');\n    dotsContainer.children[current].classList.add('active');\n    counter.textContent = `${current + 1} / ${total}`;\n    progress.style.width = `${((current + 1) / total) * 100}%`;\n  }\n\n  function changeSlide(dir) { goTo(current + dir); }\n\n  document.addEventListener('keydown', e => {\n    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeSlide(1);\n    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changeSlide(-1);\n  });\n\n  // Init progress\n  progress.style.width = `${(1 / total) * 100}%`;\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
